<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation</title>
    <link rel="stylesheet" href="./docs.css">
    <link rel="stylesheet" href="../chungus/prism/prism.css">
    <script>
      (function () {
        if (typeof localStorage === "undefined") return;
        const themeKey = "__tabbar_theme_master";
        const fontKey = "__tabbar_theme_font";

        try {
          const storedTheme = localStorage.getItem(themeKey);
          if (storedTheme) {
            const vars = JSON.parse(storedTheme);
            if (vars && typeof vars === "object") {
              const root = document.documentElement;
              Object.entries(vars).forEach(([key, value]) => {
                if (!key) return;
                root.style.setProperty(`--${key.trim()}`, value);
              });
            }
          }
        } catch (error) {
          console.warn("chungus: unable to preapply cached theme", error);
        }

        try {
          const cachedFont = localStorage.getItem(fontKey);
          if (cachedFont) {
            document.documentElement.style.setProperty("--font", cachedFont);
          }
        } catch {
          // ignore font cache failures
        }
      })();
    </script>
  </head>
  <body>
    <div class="menu-side-bar">
    </div>

    <div class="content-major">
      <div class="content">
      </div>
    </div>

    <script src="./defs.js"></script>
    <script src="../controlcommands.js"></script>
    <script src="../utils/quickyQuery.js"></script>
    <script src="../utils/reftheme.js"></script>
    <script src="../utils/kbutils.js"></script>
    <script src="../chungus/prism/prism.js" async></script>
    <script src="../utils/simpleMarkdownProcesser.js"></script>
    <script src="./docs.js"></script>
  </body>
</html>
