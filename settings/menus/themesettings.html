<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings &gt; Appearance</title>
    <style>

      :root {
          --font: 'sourceCodePro';
          --bg-color: transparent;
          --fg-color: #d4d4d4;
          --man-color: #000a;

          --card-1-filter: brightness(1);
          --card-2-filter: brightness(1.25);
          --card-3-filter: brightness(2);

          --light-blue-hl: #3daee9,
      }

      @font-face {
          font-family: 'sourceCodePro';
          src: url('../../font/SourceCodePro.ttf') format('truetype');
          font-weight: normal;
          font-style: normal;
      }

      @font-face {
          font-family: 'sourceCodePro';
          src: url('../../font/SourceCodePro-Italic.ttf') format('truetype');
          font-weight: normal;
          font-style: italic;
      }

      body, html {
          padding: 0;
          margin: 0;
          color: var(--fg-color);
          font-family: var(--font);
          font-size: 16px;
          width: 100vw;
          overflow: hidden;
          user-select: none;
          -webkit-user-select: none;
      }

      div.section {
          height: fit-content;
          width: calc(100vw - 40px);
          padding-left: 20px;
          margin-right: 20px;
          margin-top: 15px;
      }

      div.section div.title {
          width: 100%;
          border-bottom: 1px solid var(--fg-color);
          font-size: 25px;
      }

      div.section div.body {
          width: 100%;
          font-size: 20px;
          position: relative;
      }

      div.theme-container {
          width: calc(100vw - 51px);
          margin-top: 10px;
          border: 1px solid var(--fg-color);
          border-radius: 3px;
          padding: 5px;
          display: flex;
          align-items: center;
      }

      div.theme-cont-left {
          width: 100%;
      }

      div.theme-cont-right {
          max-width: fit-content;
          width: 200%;
      }

      .theme-img-wrapper {
          position: relative;
          display: inline-block;
          cursor: pointer;
      }

      .theme-img-wrapper:hover::after {
          content: attr(data-label);
          display: block;
          position: absolute;
          bottom: 6px;
          right: 1px;
          background-color: var(--man-color);
          color: var(--fg-color);
          padding: 2px 2px;
          border-radius: 2px;
          white-space: nowrap;
          z-index: 1;
          font-size: 14px;
      }

      img.theme-showcase {
          max-width: 200px;
          width: 16vw;
          border: 1px solid var(--fg-color);
          border-radius: 3px;
          position: relative;
          user-select: none;
          -webkit-user-select: none;
          filter: var(--card-1-filter);
      }

      .theme-img-wrapper:hover img.theme-showcase {
          filter: var(--card-2-filter);
      }

      .theme-img-wrapper:active img.theme-showcase {
          filter: var(--card-3-filter);
      }

    </style>
  </head>
  <body>
    <div class="section">
        <div class="title">Application Theming</div>
        <div class="body">
          <div class="theme-container">
            <div class="theme-cont-left">
              <div class="theme-img-wrapper" data-label="breeze dark" id="darktheme">
                <img class="theme-showcase" src="./theme_imgs/brz-dark.svg" alt="">
              </div>
              <div class="theme-img-wrapper" data-label="breeze light" id="lighttheme">
                <img class="theme-showcase" src="./theme_imgs/brz-light.svg" alt="">
              </div>
            </div>

            <div class="theme-cont-right">
              <div class="theme-img-wrapper" data-label="more themes" id="morethemes">
                <img class="theme-showcase" src="./theme_imgs/more-themes.svg" alt="">
              </div>
              <div class="theme-img-wrapper" data-label="custom themes" id="customthemes">
                <img class="theme-showcase" src="./theme_imgs/custom-themes.svg" alt="">
              </div>
            </div>
          </div>
        </div>
    </div>

    <script src="../../controlcommands.js"></script>
    <script src="../../utils/reftheme.js"></script>
    <script src="../../utils/kbutils.js"></script>
    <script src= "./theme_json/brz-dark.js"></script>
    <script src= "./theme_json/brz-light.js"></script>
    <script>

      window.onload = async () => {
          await fixThemeOverSettable(); // correcting theming
      }

      document.addEventListener("contextmenu", (event) => {
          event.preventDefault();
      });

      document.getElementById("darktheme").addEventListener("click", async () => {
          let json = await getSettablesAsJson() || {};
          json.theme = window.theme_brz_dark;

          setSettablesByJson(json);

          updateTopLevelTheme();
          await fixThemeOverSettable(); // correcting theming
      });

      document.getElementById("lighttheme").addEventListener("click", async () => {
          let json = await getSettablesAsJson() || {};
          json.theme = window.theme_brz_light;

          setSettablesByJson(json);

          updateTopLevelTheme();
          await fixThemeOverSettable(); // correcting theming
      });

      document.getElementById("morethemes").addEventListener("click", () => {
          window.parent.postMessage({ type: "naviiframe", url: "./menus/morethemes.html" }, "*");
      });

      document.getElementById("customthemes").addEventListener("click", () => {
          window.parent.postMessage({ type: "naviiframe", url: "./menus/customthemes.html" }, "*");
      });

      document.querySelectorAll("h1.font").forEach( (element) => {
          element.addEventListener("click", async () => {
              let json = await getSettablesAsJson() || {};
              json.font = {"font": element.dataset.font};

              setSettablesByJson(json);

              updateTopLevelTheme();
              await fixThemeOverSettable(); // correcting theming
          });
      });


      let fontSelectors = document.querySelectorAll('h1.font');
      fontSelectors.forEach( async (element) => {
          const font = element.dataset.font;
          if (font) {
              await loadFontForThemingSettables(font);
              element.style.fontFamily = font;
          }
      });

    </script>
  </body>
</html>
