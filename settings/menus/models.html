<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Customization</title>
    <style>

      :root {
          --font: 'sourceCodePro';
          --bg-color: #2a2e32;
          --fg-color: #d4d4d4;

          --table-container-bg: #2a2e32;
          --table-header-bg: #585b5e90;
          --table-row-odd-bg: #2a2e32;
          --table-row-even-bg: #585b5e40;

          --location-selection: #3daee9;

          --hl-blue-1: #3daee9;
          --hl-blue-2: #3daee922;
          --hl-blue-3: #2eb7ff;
          --hl-blue-4: #2eb7ff40;

          --tr-img-filer-na: brightness(100) grayscale(1) brightness(75%);

          --newmodel-img-filter-1: brightness(0) saturate(100%) invert(100%) sepia(1%) saturate(2180%) hue-rotate(306deg) brightness(93%) contrast(79%);
          --newmodel-img-filter-2: brightness(0) saturate(100%) invert(53%) sepia(80%) saturate(1074%) hue-rotate(175deg) brightness(103%) contrast(104%);
          --newmodel-img-filter-3: brightness(0) saturate(100%) invert(15%) sepia(22%) saturate(244%) hue-rotate(168deg) brightness(96%) contrast(92%);
      }

      @font-face {
          font-family: 'sourceCodePro';
          src: url('../../font/SourceCodePro.ttf') format('truetype');
          font-weight: normal;
          font-style: normal;
      }

      @font-face {
          font-family: 'sourceCodePro';
          src: url('../../font/SourceCodePro-Italic.ttf') format('truetype');
          font-weight: normal;
          font-style: italic;
      }

      html, body {
          height: 100vh;
          width: 100vw;
          padding: 0;
          margin: 0;
          background-color: var(--bg-color);
          color: var(--fg-color);
          font-family: var(--font);
          font-size: 16px;
          user-select: none;
          -webkit-user-select: none;
          overflow-x: hidden;
          position: relative;
      }

      div.master-container {
          width: calc(100% - 40px);
          height: calc(100% - 30px);
          margin: 15px 20px;
      }

      div.container-header {
          width: 100%;
          font-size: 25px;
          border-bottom: 1px solid var(--fg-color);
          margin-bottom: 10px;
      }

      div.container-body {
          width: 100%;
          height: fit-content;
      }

      div.table-container {
          border: 1px solid var(--fg-color);
          border-radius: 4px;
          overflow: hidden;
          background-color: var(--table-container-bg);
      }

      table {
          width: 100%;
          border-collapse: collapse;
      }

      td, th {
          border: 1px solid var(--fg-color);
          padding: 8px;
          text-align: left;
      }

      th:first-child, td:first-child {
          border-left: none;
      }

      th:last-child, td:last-child {
          border-right: none;
      }

      tbody > tr:last-child > td {
          border-bottom: none;
      }

      th {
          border-top: none;
          background-color: var(--table-header-bg);
          color: var(--table-header-fg);
      }

      tr:nth-child(even) td {
          background-color: var(--table-row-even-bg);
      }

      tr:nth-child(odd) td {
          background-color: var(--table-row-odd-bg);
      }

      td:has(> img) {
          padding: 0 0 0 5px;
          font-size: 0;
          vertical-align: middle;
      }

      td > img {
          width: 25px;
          height: 25px;
          user-drag: none;
          -webkit-user-drag: none;
          user-select: none;
          -webkit-user-select: none;
      }

      img[type="moveHandle"] {
          cursor: grab;
      }

      tr:not(:hover) img {
          opacity: 0;
      }

      tr img.active {
          opacity: 1;
          filter: none !important;
      }

      tr img:not(:hover) {
          filter: var(--tr-img-filer-na);
      }

      td {
          outline: none;
          user-select: text;
          -webkit-user-select: text;
      }

      td::selection {
          color: var(--bg-color);
          background-color: var(--location-selection);
      }

      div.newRow {
          display: flex;
          width: fit-content;
          padding: 5px;
          border-radius: 3px;
          margin-top: 8px;
          border: 1px solid var(--fg-color);
      }

      div.newRow:hover{
          background-color: var(--hl-blue-2);
          color: var(--hl-blue-3);
          border-color: var(--hl-blue-3);
      }

      div.newRow:active{
          background-color: var(--hl-blue-3);
          color: var(--bg-color);
          border-color: var(--hl-blue-3);
      }

      div.newRow img {
          height: 1lh;
          filter: var(--newmodel-img-filter-1);
          margin-right: 5px;
      }

      div.newRow:hover img {
          filter: var(--newmodel-img-filter-2);
      }

      div.newRow:active img {
          filter: var(--newmodel-img-filter-3);
      }

      tr.placeholder td {
          border: none;
          color: transparent;
      }

      tr.placeholder td img {
          display: none;
      }

      body.is-dragging {
          cursor: grabbing;
      }

      div.draggingRow {
          position: fixed;
          z-index: 9999;
          pointer-events: none;
          overflow: hidden;
          background-color: var(--bg-color);
          border-left: 1px solid var(--fg-color);
          border-bottom: 1px solid var(--fg-color);
          border-right: 1px solid var(--fg-color);
      }

      div.draggingRow table {
          width: 100%;
          border-collapse: collapse;
          table-layout: fixed;
      }

      div.draggingRow img {
          opacity: 1 !important;
          filter: none !important;
      }

      body.is-dragging img:not(.active):not(.newRow img) {
          opacity: 0;
      }

    </style>
  </head>
  <body>
    <div class="master-container">
      <div class="container-header">
        Model Customization
      </div>
      <div class="container-body">
        <div class="table-container">
          <table>
            <thead>
              <th>Actions</th>
              <th>Userspace Name</th>
              <th>API Name</th>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>

        <div class="newRow"><img src="../../icons/add-table-row.svg" />New Model</div>
      </div>
    </div>

    <script src="../../controlcommands.js"></script>
    <script src="../../utils/reftheme.js"></script>
    <script src="../../utils/kbutils.js"></script>
    <script>

      window.onload = async () => {
          await fixThemeOverSettable();
          await readInTable();

          document.querySelector("div.newRow").addEventListener("click", async () => {
              let modelJSON = getModelJson();
              modelJSON.models.push({
                  userspace_name: "New Model",
                  api_name: "provider/model-name",
              });

              await readInTableAsJSON(modelJSON);
              await saveModels();
          });
      };

      async function readInTable() {
          const modelJSON = await getModelJSON();

          await readInTableAsJSON(modelJSON);
      }

      async function getModelJSON() {
          const defaultModelJSON = {
              activeIndex: 0,
              models: [
                  {userspace_name: "ChatGPT OSS 120B", api_name:"openai/gpt-oss-120b:free"},
                  {userspace_name: "Gemma 4 31B", api_name:"google/gemma-4-31b-it:free"},
                  {userspace_name: "Llama 3.2 3B Instruct", api_name:"meta-llama/llama-3.2-3b-instruct:free"},
              ],
          };

          const settables = await getSettablesAsJson();

          if (!settables) return defaultModelJSON;
          if (!settables.models) return defaultModelJSON;

          return settables.models;
      }

      async function readInTableAsJSON(modelJSON) {
          const tbody = document.querySelector("tbody");

          tbody.innerHTML = "";

          tbody.innerHTML = modelJSON.models.map(model => `
              <tr>
                  <td>
                      <img src="../../icons/modelkeyactive.svg" type="activate" />
                      <img src="../../icons/removetablerow.svg" type="removeRow" />
                      <img src="../../icons/moverow.svg" type="moveHandle" />
                  </td>
                  <td contenteditable="true" spellcheck="false">${model.userspace_name}</td>
                  <td contenteditable="true" spellcheck="false">${model.api_name}</td>
              </tr>
          `).join("");

          tbody.querySelector(`tr:nth-child(${modelJSON.activeIndex + 1})`)
              .querySelector(`img[type="activate"]`).classList.add("active");

          document.querySelectorAll("td").forEach((element) => {
              if (!element.isContentEditable) return;

              element.addEventListener("focus", () => {
                  element.dataset.oldValue = element.textContent;
              });

              element.addEventListener("keydown", async (event) => {
                  if (event.key === "Escape") {
                      event.preventDefault();
                      element.textContent = element.dataset.oldValue;
                      element.blur();
                  }
                  else if (event.key === "Enter") {
                      event.preventDefault();
                      element.blur();
                  }

                  await saveModels()
              });

              element.addEventListener("blur", saveModels);
          });

          document.querySelectorAll("img[type='removeRow']").forEach((element) => {
              element.addEventListener("click", async () => {
                  const row = element.closest("tr");
                  const rowsBefore = Array.from(tbody.querySelectorAll("tr"));
                  const rowIndex = rowsBefore.indexOf(row);
                  const wasActive = row.querySelector("img[type='activate']").classList.contains("active");

                  if (rowsBefore.length === 1) return;

                  row.remove();

                  if (wasActive) {
                      const rowsAfter = Array.from(tbody.querySelectorAll("tr"));
                      const newIndex = Math.min(rowIndex, rowsAfter.length - 1);

                      rowsAfter[newIndex]
                          .querySelector("img[type='activate']")
                          .classList.add("active");
                  }

                  await saveModels();
              });
          });

          document.querySelectorAll("img[type='activate']").forEach((element) => {
              element.addEventListener("click", async () => {
                  document.querySelectorAll("img[type='activate']").forEach((elt) => {
                      elt.classList.remove("active");
                  });
                  element.classList.add("active");

                  await saveModels();
              });
          });

          document.querySelectorAll("img[type='moveHandle']").forEach((element) => {
              element.addEventListener("mousedown", startRowDrag);
              element.addEventListener("dragstart", (event) => event.preventDefault());
          });
      }

      let dragState = null;
      let dragCommitPending = false;

      function startRowDrag(event) {
          if (event.button !== 0 || dragState || dragCommitPending) return;

          event.preventDefault();
          event.stopPropagation();

          const handle = event.currentTarget;
          const row = handle.closest("tr");
          const tbody = row.closest("tbody");
          const table = row.closest("table");
          const rowRect = row.getBoundingClientRect();
          const tableRect = table.getBoundingClientRect();
          const cellWidths = Array.from(row.children).map((cell) => cell.getBoundingClientRect().width);

          const draggingRow = document.createElement("div");
          draggingRow.className = "draggingRow";
          draggingRow.style.left = `${tableRect.left - 1}px`; // account for the tables
          draggingRow.style.top = `${rowRect.top}px`;
          draggingRow.style.width = `${tableRect.width}px`;
          draggingRow.style.height = `${rowRect.height}px`;

          const dragTable = document.createElement("table");
          const dragTbody = document.createElement("tbody");
          const cloneRow = row.cloneNode(true);
          cloneRow.classList.remove("placeholder");

          Array.from(cloneRow.children).forEach((cell, index) => {
              const sourceCell = row.children[index];
              const sourceStyle = getComputedStyle(sourceCell);

              cell.style.width = `${cellWidths[index]}px`;
              cell.style.boxSizing = "border-box";
          });

          dragTbody.appendChild(cloneRow);
          dragTable.appendChild(dragTbody);
          draggingRow.appendChild(dragTable);
          document.body.appendChild(draggingRow);

          row.classList.add("placeholder");
          document.body.classList.add("is-dragging");

          dragState = {
              row,
              tbody,
              draggingRow,
              offsetY: event.clientY - rowRect.top,
          };

          document.addEventListener("mousemove", onRowDragMove);
          document.addEventListener("mouseup", onRowDragEnd, { once: true });

          onRowDragMove(event);
      }

      function onRowDragMove(event) {
          if (!dragState) return;

          dragState.draggingRow.style.top = `${event.clientY - dragState.offsetY}px`;

          placePlaceholderForY(event.clientY);
      }

      function onRowDragEnd() {
          if (!dragState) return;

          const { row, draggingRow } = dragState;

          document.removeEventListener("mousemove", onRowDragMove);
          draggingRow.remove();
          row.classList.remove("placeholder");
          document.body.classList.remove("is-dragging");
          dragState = null;
          dragCommitPending = true;

          void (async () => {
              try {
                  await saveModels();
                  await readInTable();
              }
              catch (error) {
                  console.error(error);
              }
              finally {
                  dragCommitPending = false;
              }
          })();
      }

      function placePlaceholderForY(clientY) {
          if (!dragState) return null;

          const tbody = dragState.tbody;
          const rows = Array.from(tbody.querySelectorAll("tr"));

          if (rows.length === 0) return;

          const firstRowRect = rows[0].getBoundingClientRect();
          const lastRowRect = rows[rows.length - 1].getBoundingClientRect();

          if (clientY <= firstRowRect.top) {
              if (dragState.row !== rows[0]) tbody.insertBefore(dragState.row, rows[0]);
              return;
          }

          if (clientY >= lastRowRect.bottom) {
              if (dragState.row !== rows[rows.length - 1]) tbody.appendChild(dragState.row);
              return;
          }

          while (true) {
              const rect = dragState.row.getBoundingClientRect();

              if (clientY >= rect.top && clientY <= rect.bottom) return;

              if (clientY < rect.top) {
                  const prevRow = dragState.row.previousElementSibling;
                  if (!prevRow) return;
                  tbody.insertBefore(dragState.row, prevRow);
                  continue;
              }

              const nextRow = dragState.row.nextElementSibling;
              if (!nextRow) return;
              tbody.insertBefore(nextRow, dragState.row);
          }
      }

      function getActiveIndex() {
          const tbody = document.querySelector("tbody");
          const rows = Array.from(tbody.querySelectorAll("tr"));
          const activeRow = tbody.querySelector("tr:has(img.active[type='activate'])");

          if (!activeRow) return 0;

          return rows.indexOf(activeRow);
      }

      function getModelJson() {
          const tbody = document.querySelector("tbody");
          const rows = Array.from(tbody.querySelectorAll("tr"));

          let modelsData = {
              activeIndex: getActiveIndex(),
              models: [],
          };

          rows.forEach((row) => {
              const cells = row.querySelectorAll("td");

              modelsData.models.push({
                  userspace_name: cells[1].textContent.trim(),
                  api_name: cells[2].textContent.trim(),
              });
          });

          return modelsData;
      }

      async function saveModels() {
          const settables = await getSettablesAsJson();
          settables.models = getModelJson();
          await setSettablesByJson(settables);
      }

    </script>
  </body>
</html>
