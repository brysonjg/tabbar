<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chungusmain</title>

    <script>
      (function () {
        if (typeof localStorage === "undefined") return;
        const themeKey = "__tabbar_theme_master";
        const fontKey = "__tabbar_theme_font";

        try {
          const storedTheme = localStorage.getItem(themeKey);
          if (storedTheme) {
            const vars = JSON.parse(storedTheme);
            if (vars && typeof vars === "object") {
              const root = document.documentElement;
              Object.entries(vars).forEach(([key, value]) => {
                if (!key) return;
                root.style.setProperty(`--${key.trim()}`, value);
              });
            }
          }
        } catch (error) {
          console.warn("chungus: unable to preapply cached theme", error);
        }

        try {
          const cachedFont = localStorage.getItem(fontKey);
          if (cachedFont) {
            document.documentElement.style.setProperty("--font", cachedFont);
          }
        } catch {
          // ignore font cache failures
        }
      })();
    </script>

    <link rel="stylesheet" href="./chungus.css">
    <link rel="stylesheet" href="../utils/simpleMarkdownProcessor.css">

    <!--   prism   -->
      <link rel="stylesheet" href="./prism/prism.css">
      <script src="./prism/prism.js" async></script>

  </head>
  <body>

    <div class="chat-outerer">
      <div class="chat-outer">
        <div class="blame-column" id="blameColumn">
        </div>
        <div id="chat-container">
        </div>
        <div class="action-group-bar">
          <div class="action-btn-wrapper">
            <img class="action-bar-action change-title-btn" src="../icons/document-edit.svg" alt="Change Title" title="change title">
          </div>
          <div class="action-btn-wrapper">
            <img class="action-bar-action chat-history-btn" src="../icons/vcs-branch.svg" alt="View History" title="view history">
          </div>
        </div>
      </div>
    </div>

    <div class="usr-input-master-container before-messages">
      <div class="initMessage">How can I help you?</div>
      <div class="usr-input-master">
        <div class="usr-input-topper">
          <input type="file" id="hidden-file-input" multiple> </input>
          <div id="file-field">
            <div class="context" id="add-context">Add Context</div>
          </div>
        </div>
        <div class="usr-input-body">
          <textarea id="text-input"></textarea>
        </div>
        <div class="usr-input-bottom">
          <div class="usr-input-left">
            <div class="menu">
              Models
              <div class="dropdown-nul">
                <div class="menu-item" type="setModel" model="openai/gpt-oss-120b:free">ChatGPT OSS 120B</div>
                <div class="menu-item" type="setModel" model="google/gemma-4-31b-it:free">Gemma 4 31B</div>
                <div class="menu-item" type="setModel" model="meta-llama/llama-3.2-3b-instruct:free">Llama 3.2 3B Instruct</div>
              </div>
            </div>
          </div>
          <div class="usr-input-right">
            <img src="../icons/sendmessage.svg" class="submission-icon" id="submissionIcon">
          </div>
        </div>
      </div>
    </div>

    <script src="../controlcommands.js"></script>
    <script src="../utils/reftheme.js"></script>
    <script src="../utils/kbutils.js"></script>
    <script src="../utils/historyObject.js"></script>
    <script src="../icons/type-icons/geticon.js"></script>
    <script src="../utils/simpleMarkdownProcessor.js"></script>
    <script src="./api-key.js"></script>
    <script src="./chungus.js"></script>

  </body>
</html>
